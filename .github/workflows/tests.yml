#Test CI/CD
# Le nom qui s'affichera dans l'interface GitHub Actions
name: Tests Symfony E-commerce
# ------------------------------------------------------------------
# DÉCLENCHEURS (TRIGGERS)
# Définit quand ce workflow doit s'exécuter
# ------------------------------------------------------------------
on: 
  push:
    branches: [ master, main, develop ]  # Se lance à chaque push sur les branches principales
  pull_request:
    branches: [ master, main ]  # Se lance quand une PR est ouverte vers 'main'

jobs:
  tests:
    runs-on: ubuntu-latest  # Utilise une machine virtuelle Linux

    steps:
    # 1. Récupération du code source
    - name: Checkout
      uses: actions/checkout@v4

    # 2. Configuration de l'environnement PHP
    - name: Setup PHP 8.4  
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: sqlite3

    # 3. Création du fichier .env minimal pour les tests
    # Nécessaire car le .env est dans le .gitignore
    - name: Create .env file
      run: |
        echo "APP_ENV=test" >> .env
        echo "APP_SECRET=testsecretkey123456789abcdef01234" >> .env
        echo "DATABASE_URL=sqlite:///%kernel.project_dir%/var/test.db" >> .env

    # 4. Mise en cache des dépendances Composer
    - name: Cache Composer
      uses: actions/cache@v4
      with:
        path: vendor
        key: composer-${{ hashFiles('**/composer.lock') }}

    # 5. Installation des dépendances du projet
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    # 6. Exécution des tests unitaires et fonctionnels
    - name: Run PHPUnit tests
      run: php bin/phpunit --colors=always --coverage-tex
