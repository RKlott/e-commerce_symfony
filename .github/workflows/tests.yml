#Test CI/CD
name: Tests Symfony E-commerce

on: 
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupération du code source
    - name: Checkout
      uses: actions/checkout@v4

    # 2. Configuration de l'environnement PHP
    - name: Setup PHP 8.4  
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: sqlite3

    # 3. Création du fichier .env minimal pour les tests
    - name: Create .env file
      run: |
        echo "APP_ENV=test" >> .env
        echo "APP_SECRET=testsecretkey123456789abcdef01234" >> .env
        echo "APP_SHARE_DIR=var/share" >> .env
        echo "DEFAULT_URI=http://localhost" >> .env
        echo "DATABASE_URL=sqlite:///%kernel.project_dir%/var/test.db" >> .env
        echo "MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0" >> .env
        echo "MAILER_DSN=null://null" >> .env
        echo "STRIPE_SECRET_KEY=sk_test_fake_key_for_ci" >> .env

    # 4. Mise en cache des dépendances Composer
    - name: Cache Composer
      uses: actions/cache@v4
      with:
        path: vendor
        key: composer-${{ hashFiles('**/composer.lock') }}

    # 5. Installation des dépendances du projet
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    # 6. Création du schéma de base de données SQLite
    - name: Create database schema
      env:
        DATABASE_URL: "sqlite:///%kernel.project_dir%/var/test.db"
      run: php bin/console doctrine:schema:create --env=test

    # 7. Exécution des tests
    - name: Run PHPUnit tests
      env:
        DATABASE_URL: "sqlite:///%kernel.project_dir%/var/test.db"
      run: php bin/phpunit --colors=always --coverage-text
